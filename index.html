<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나도 사장 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
/* --- 사장님의 원본 CSS 디자인 (100% 복구) --- */
:root{
  --soil:#6B4226;--grass:#5A8A3C;--sun:#F4C430;
  --cream:#FFF8F0;--latte:#C8956C;--espresso:#3B1F0F;
  --gold:#D4A017;--text:#2C1A0E;
  --panel:rgba(255,248,240,0.96);
  --shadow:0 4px 20px rgba(59,31,15,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gowun Dodum',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 3s ease;}
#app{display:grid;grid-template-rows:auto 1fr;min-height:100vh;max-width:1400px;margin:0 auto;padding:10px;gap:8px;}

/* HEADER & UI COMPONENTS */
header{background:var(--panel);border-radius:16px;padding:10px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);border:2px solid rgba(212,160,23,0.25);flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:8px;flex:1;min-width:160px;}
.brand-name{font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:800;color:var(--espresso);}
#season-badge{font-family:'Jua',sans-serif;font-size:12px;padding:5px 12px;border-radius:20px;white-space:nowrap;border:1.5px solid;}
.stats-bar{display:flex;gap:12px;align-items:center;}
.stat{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;}

/* FLOATING EFFECT */
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-50px)} }
.floating-num { position:absolute; pointer-events:none; font-weight:800; font-family:'Jua'; z-index:9999; animation:floatUp 0.8s ease-out forwards; }

/* FARM & CAFE GRID (기존과 동일) */
#game-main{display:grid;grid-template-columns:290px 1fr 285px;gap:8px;}
.panel{background:var(--panel);border-radius:14px;padding:13px;box-shadow:var(--shadow);border:1.5px solid rgba(200,149,108,0.18);display:flex;flex-direction:column;gap:9px;}
#farm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.plot{aspect-ratio:1;border-radius:9px;border:2px solid rgba(107,66,38,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;}
.plot.ready{animation:pulse 1.2s infinite;}
@keyframes pulse { 0%,100%{box-shadow:0 0 6px rgba(244,196,48,0.3)} 50%{box-shadow:0 0 14px rgba(244,196,48,0.7)} }

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(59,31,15,0.65);display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--cream);border-radius:18px;padding:24px;width:90%;max-width:500px;}

/* MOBILE NAVIGATION */
#mob-bar {display:none;}
@media (max-width: 768px) {
  #game-main {display:block;}
  .col-tab {display:none;}
  .col-tab.active {display:flex; flex-direction:column; gap:8px;}
  #mob-bar {display:flex; position:fixed; bottom:0; left:0; right:0; background:white; border-top:2px solid #ddd; padding:10px; justify-content:space-around; z-index:999;}
}
</style>
</head>
<body>

<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div style="text-align:center; font-family:'Nanum Myeongjo'; font-weight:800; font-size:18px; margin-bottom:15px;">🌱 나만의 카페 시작하기</div>
    <p style="text-align:center; color:var(--latte); font-size:13px; margin-bottom:14px;">농장을 키우고 재료를 모아 카페를 운영하세요!</p>
    <input id="brandInput" style="width:100%; padding:10px; border-radius:10px; border:2px solid #ddd; margin-bottom:15px;" placeholder="브랜드 이름 입력 (예: 햇살 카페)" maxlength="20">
    <button onclick="game.startGame()" style="width:100%; padding:12px; background:var(--espresso); color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer;">✨ 시작하기</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="brand">
      <div id="brandIcon" style="font-size:26px;">🌱</div>
      <div>
        <div class="brand-name" id="brandNameDisplay">내 농장</div>
        <div style="font-size:10px; color:var(--latte);">나도 사장</div>
      </div>
    </div>
    <div id="season-badge">🌸 봄</div>
    <div class="stats-bar">
      <div class="stat">💰 <span id="moneyDisplay">100,000</span>원</div>
      <div class="stat">⭐ <span id="repDisplay">0</span></div>
      <div class="stat">📅 Day <span id="dayDisplay">1</span></div>
      <button class="btn" style="background:#eee; padding:4px 8px; border-radius:8px; font-size:11px;" onclick="audio.toggleMute()">🔊 <span id="muteLabel">소리 켬</span></button>
    </div>
  </header>

  <main id="game-main">
    <div id="col-farm" class="col-tab active">
      <div class="panel">
        <div style="font-family:'Jua'; border-bottom:2px dashed #ddd; padding-bottom:5px;">🌾 농장</div>
        <div id="farm-grid"></div>
        <div id="inventoryInline" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
      </div>
      <div class="panel">
        <div style="font-family:'Jua'; border-bottom:2px dashed #ddd; padding-bottom:5px;">📜 활동 로그</div>
        <div id="logEntries" style="height:120px; overflow-y:auto; font-size:11px;"></div>
      </div>
    </div>

    <div id="col-cafe" class="col-tab">
      <div id="cafe-locked" class="panel" style="text-align:center; padding:30px;">
        <h3 style="font-family:'Jua';">🔐 카페 준비 중</h3>
        <p style="font-size:12px; margin:10px 0;">재료 20개를 모으면 오픈 가능!</p>
        <button id="openCafeBtn" onclick="game.openCafe()" style="display:none; margin:10px auto; padding:10px 20px; background:var(--espresso); color:white; border:none; border-radius:10px; cursor:pointer;">☕ 오픈하기</button>
      </div>
      <div id="cafe-open" class="panel" style="display:none;">
        <div id="cafeStageLabel" style="font-family:'Jua'; font-weight:800; font-size:16px;">☕ 노점 카페</div>
        <div style="height:8px; background:#eee; border-radius:4px; overflow:hidden; margin:8px 0;">
            <div id="progressFill" style="height:100%; width:0%; background:var(--sun); transition:0.5s;"></div>
        </div>
        <div id="customerList"></div>
        <div id="menuGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:10px;"></div>
      </div>
    </div>

    <div id="col-manage" class="col-tab">
        <div class="panel">
            <div style="font-family:'Jua'; border-bottom:2px dashed #ddd; padding-bottom:5px;">🔧 관리</div>
            <button onclick="game.save(true)" style="padding:10px; background:#ddd; border:none; border-radius:8px; cursor:pointer;">💾 데이터 저장</button>
            <button onclick="game.reset()" style="padding:10px; background:#ffcdd2; border:none; border-radius:8px; cursor:pointer; margin-top:5px;">⚠️ 초기화</button>
        </div>
    </div>
  </main>

  <nav id="mob-bar">
    <button onclick="ui.mobileSwitch('farm')">🌾 농장</button>
    <button onclick="ui.mobileSwitch('cafe')">☕ 카페</button>
    <button onclick="ui.mobileSwitch('manage')">⚙️ 관리</button>
  </nav>
</div>

<div class="modal-overlay" id="plantModal">
    <div class="modal">
        <div id="plantModalTitle" style="font-family:'Jua'; margin-bottom:10px;">씨앗 고르기</div>
        <div id="plantModalBody" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
        <button onclick="ui.closeModal()" style="margin-top:15px; width:100%; padding:10px; border-radius:10px; border:none; background:#eee;">닫기</button>
    </div>
</div>

<script>
'use strict';

// [오디오 시스템] 사장님이 원하신 몰입도 사운드
const audio = {
    ctx: null, isMuted: false, bgm: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    toggleMute() { 
        this.isMuted = !this.isMuted; 
        document.getElementById('muteLabel').textContent = this.isMuted ? '소리 끔' : '소리 켬';
        if (this.isMuted) this.ctx.suspend(); else this.ctx.resume();
    },
    playSfx(type) {
        if (!this.ctx || this.isMuted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        const now = this.ctx.currentTime;
        if (type === 'plant') { osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now+0.1); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now+0.1); }
        if (type === 'harvest') { osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(800, now+0.1); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now+0.1); }
        if (type === 'serve') { osc.type='sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now+0.3); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now+0.3); }
    }
};

const game = {
    // 사장님의 원본 데이터 (CROPS, RECIPES, STAGES 등)
    CROPS: {
        wheat: {emoji:'🌾', name:'밀', growTime:15, cost:500, yield:5, gives:'wheat'},
        strawb: {emoji:'🍓', name:'딸기', growTime:20, cost:1000, yield:4, gives:'strawb'},
        bean: {emoji:'🫘', name:'커피콩', growTime:30, cost:2000, yield:6, gives:'bean'},
        milk_c: {emoji:'🥛', name:'유제품', growTime:25, cost:3000, yield:5, gives:'milk'}
    },
    RECIPES: {
        egg_toast: {emoji:'🍳', name:'계란 토스트', price:4000, stageReq:1, ingredients:{wheat:1}, learnCost:0},
        americano: {emoji:'🖤', name:'아메리카노', price:4500, stageReq:2, ingredients:{bean:2}, learnCost:2000},
        latte: {emoji:'☕', name:'라떼', price:5500, stageReq:2, ingredients:{bean:1, milk:1}, learnCost:3000}
    },
    STAGES: [
        {name:'🌱 농장', building:'🏕️', repReq:0},
        {name:'🛖 노점', building:'🛖', repReq:200},
        {name:'🏠 토스트점', building:'🏠', repReq:600},
        {name:'☕ 카페', building:'☕', repReq:1500}
    ],

    state: {
        brandName:'내 농장', money:50000, reputation:0, day:1, stage:0,
        cafeOpen:false, plots: Array(8).fill(null).map(()=>({crop:null, plantedAt:null, stage:'empty'})),
        inventory: {wheat:0, strawb:0, bean:0, milk:0},
        learnedRecipes: ['egg_toast'],
        secondsPlayed: 0, dayTimer: 0
    },

    init() {
        this.load();
        setInterval(() => this.tick(), 1000);
        window.addEventListener('beforeunload', () => this.save());
        if (this.state.secondsPlayed === 0) ui.showModal('nameModal');
        ui.renderAll();
    },

    startGame() {
        const input = document.getElementById('brandInput').value.trim();
        if (input) this.state.brandName = input;
        ui.closeModal('nameModal');
        audio.init();
        ui.renderAll();
        ui.addLog(`🚀 ${this.state.brandName} 카페의 전설이 시작됩니다!`);
    },

    tick() {
        this.state.secondsPlayed++; this.state.dayTimer++;
        if (this.state.dayTimer >= 90) { this.state.dayTimer = 0; this.state.day++; this.save(true); }
        if (this.state.secondsPlayed % 30 === 0) this.save(true);

        this.state.plots.forEach(p => {
            if (p.stage === 'growing') {
                const elapsed = (Date.now() - p.plantedAt) / 1000;
                if (elapsed >= this.CROPS[p.crop].growTime) p.stage = 'ready';
            }
        });

        if (this.state.cafeOpen && Math.random() < 0.05 && this.state.customers?.length < 5) this.spawnCustomer();
        this.checkStageUp();
        ui.renderAll();
    },

    spawnCustomer() {
        if (!this.state.customers) this.state.customers = [];
        const pool = Object.keys(this.RECIPES).filter(k => this.state.learnedRecipes.includes(k));
        const order = pool[Math.floor(Math.random() * pool.length)];
        this.state.customers.push({ id: Date.now(), order, patience: 100 });
    },

    checkStageUp() {
        const next = this.STAGES[this.state.stage + 1];
        if (next && this.state.reputation >= next.repReq) { this.state.stage++; ui.addLog(`🎊 카페 업그레이드: ${next.name}`); }
    },

    openCafe() {
        const total = Object.values(this.state.inventory).reduce((a,b)=>a+b, 0);
        if (total >= 20) { this.state.cafeOpen = true; this.state.stage = 1; ui.addLog("☕ 카페가 드디어 오픈되었습니다!"); }
    },

    save(silent = false) {
        localStorage.setItem('boss_save_final', JSON.stringify(this.state));
        if (silent && this.state.secondsPlayed % 60 === 0) ui.addLog("💾 데이터 자동 저장됨.");
    },

    load() {
        const saved = localStorage.getItem('boss_save_final');
        if (saved) this.state = { ...this.state, ...JSON.parse(saved) };
    },

    reset() { if (confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }
};

const ui = {
    renderAll() {
        document.getElementById('brandNameDisplay').textContent = game.state.brandName;
        document.getElementById('moneyDisplay').textContent = game.state.money.toLocaleString();
        document.getElementById('repDisplay').textContent = game.state.reputation;
        document.getElementById('dayDisplay').textContent = game.state.day;
        document.getElementById('stageBadge').textContent = game.STAGES[game.state.stage].name;
        document.getElementById('brandIcon').textContent = game.STAGES[game.state.stage].building;
        this.renderFarm(); this.renderInventory(); this.renderCafe();
    },

    renderFarm() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = game.state.plots.map((p, i) => {
            let content = '+'; let cls = '';
            if (p.stage !== 'empty') content = game.CROPS[p.crop].emoji;
            if (p.stage === 'ready') cls = 'ready';
            return `<div class="plot ${cls}" onclick="ui.plotClick(event, ${i})">${content}</div>`;
        }).join('');
    },

    plotClick(e, i) {
        const p = game.state.plots[i];
        if (p.stage === 'empty') { this.openSeedPicker(i); }
        else if (p.stage === 'ready') {
            audio.playSfx('harvest');
            const crop = game.CROPS[p.crop];
            game.state.inventory[crop.gives] += crop.yield;
            this.showFloating(e.pageX, e.pageY, `+${crop.yield}`, 'var(--grass)');
            game.state.plots[i] = {crop:null, plantedAt:null, stage:'empty'};
        }
    },

    showFloating(x, y, txt, color) {
        const el = document.createElement('div'); el.className='floating-num'; el.textContent=txt; el.style.left=x+'px'; el.style.top=y+'px'; el.style.color=color;
        document.body.appendChild(el); setTimeout(()=>el.remove(), 800);
    },

    openSeedPicker(idx) {
        const body = document.getElementById('plantModalBody');
        body.innerHTML = Object.entries(game.CROPS).map(([k, c]) => 
            `<button onclick="ui.plant(event, ${idx}, '${k}')" style="padding:10px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer;">${c.emoji} ${c.name}<br><small>💰${c.cost}</small></button>`
        ).join('');
        this.showModal('plantModal');
    },

    plant(e, idx, k) {
        const crop = game.CROPS[k];
        if (game.state.money >= crop.cost) {
            audio.playSfx('plant');
            game.state.money -= crop.cost;
            game.state.plots[idx] = {crop: k, plantedAt: Date.now(), stage:'growing'};
            this.showFloating(e.pageX, e.pageY, `-💰${crop.cost}`, '#e74c3c');
            this.closeModal('plantModal');
        }
    },

    renderInventory() {
        const inv = document.getElementById('inventoryInline');
        inv.innerHTML = Object.entries(game.state.inventory).map(([k, v]) => v > 0 ? `<div class="inv-chip" style="background:rgba(107,66,38,0.1); padding:3px 8px; border-radius:15px; font-size:11px;">📦 ${v}</div>` : '').join('');
    },

    renderCafe() {
        if (!game.state.cafeOpen) {
            const total = Object.values(game.state.inventory).reduce((a,b)=>a+b, 0);
            document.getElementById('openCafeBtn').style.display = total >= 20 ? 'block' : 'none';
            return;
        }
        document.getElementById('cafe-locked').style.display = 'none';
        document.getElementById('cafe-open').style.display = 'block';
        
        const list = document.getElementById('customerList');
        list.innerHTML = (game.state.customers || []).map(c => `
            <div style="background:white; padding:8px; border-radius:10px; margin-bottom:5px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:11px;"><b>손님</b><br><small>${game.RECIPES[c.order].name}</small></div>
                <button onclick="ui.serveCustomer(event, ${c.id})" style="padding:4px 8px; background:var(--grass); color:white; border:none; border-radius:5px; font-size:11px; cursor:pointer;">서빙</button>
            </div>
        `).join('');

        const next = game.STAGES[game.state.stage + 1];
        if (next) {
            const pct = Math.min(100, (game.state.reputation / next.repReq) * 100);
            document.getElementById('progressFill').style.width = pct + "%";
        }
    },

    serveCustomer(e, id) {
        const idx = game.state.customers.findIndex(c => c.id === id);
        const recipe = game.RECIPES[game.state.customers[idx].order];
        for (const [ing, qty] of Object.entries(recipe.ingredients)) {
            if ((game.state.inventory[ing] || 0) < qty) { alert("재료 부족!"); return; }
        }
        audio.playSfx('serve');
        for (const [ing, qty] of Object.entries(recipe.ingredients)) game.state.inventory[ing] -= qty;
        game.state.money += recipe.price; game.state.reputation += 30;
        this.showFloating(e.pageX, e.pageY, `+💰${recipe.price}`, 'var(--gold)');
        game.state.customers.splice(idx, 1);
        this.renderAll();
    },

    addLog(msg) {
        const log = document.getElementById('logEntries');
        const div = document.createElement('div');
        div.innerHTML = `> ${msg}`; log.prepend(div);
    },

    showModal(id) { document.getElementById(id).classList.add('show'); },
    closeModal(id) { document.getElementById(id).classList.remove('show'); },
    mobileSwitch(id) { document.querySelectorAll('.col-tab').forEach(t => t.classList.remove('active')); document.getElementById('col-'+id).classList.add('active'); }
};

game.init();
</script>
</body>
</html>
