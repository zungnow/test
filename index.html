<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나도 사장 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
/* --- 기존 스타일 유지 및 애니메이션 추가 --- */
:root {
  --soil:#6B4226; --grass:#5A8A3C; --sun:#F4C430;
  --cream:#FFF8F0; --latte:#C8956C; --espresso:#3B1F0F;
  --gold:#D4A017; --text:#2C1A0E;
  --panel:rgba(255,248,240,0.96);
  --shadow:0 4px 20px rgba(59,31,15,0.12);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Gowun Dodum',sans-serif; color:var(--text); min-height:100vh; background:var(--cream); overflow-x:hidden; }
#app { display:grid; grid-template-rows:auto 1fr; min-height:100vh; max-width:1400px; margin:0 auto; padding:10px; gap:8px; }

/* HEADER */
header { background:var(--panel); border-radius:16px; padding:10px 18px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); border:2px solid rgba(212,160,23,0.25); position:relative; z-index:10; }
.brand { display:flex; align-items:center; gap:8px; flex:1; }
.brand-name { font-family:'Nanum Myeongjo',serif; font-size:20px; font-weight:800; color:var(--espresso); }
.stats-bar { display:flex; gap:12px; align-items:center; }
.stat { font-size:13px; font-weight:600; display:flex; align-items:center; gap:4px; }

/* FLOATING TEXT ANIMATION */
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}
.floating-num {
  position: absolute; pointer-events: none; font-weight: 800; font-family: 'Jua';
  z-index: 9999; animation: floatUp 0.8s ease-out forwards;
}

/* PANELS & GRIDS (기존과 동일) */
#game-main { display:grid; grid-template-columns:300px 1fr 300px; gap:10px; }
.panel { background:var(--panel); border-radius:14px; padding:15px; border:1.5px solid rgba(200,149,108,0.18); display:flex; flex-direction:column; gap:10px; box-shadow:var(--shadow); }
#farm-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.plot { aspect-ratio:1; border-radius:10px; border:2px solid rgba(107,66,38,0.3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:24px; position:relative; background:#eee; transition:0.2s; }
.plot.ready { animation:pulse 1.5s infinite; background:#fff; border-color:var(--sun); }
@keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(244,196,48,0.4); } 70% { box-shadow:0 0 0 10px rgba(244,196,48,0); } 100% { box-shadow:0 0 0 0 rgba(244,196,48,0); } }

/* BUTTONS */
.btn { cursor:pointer; border:none; border-radius:8px; padding:8px 12px; font-family:inherit; font-weight:600; transition:0.2s; }
.btn-primary { background:var(--espresso); color:white; }

/* MOBILE */
#mob-bar { display:none; }
@media (max-width: 768px) {
  #game-main { display:block; }
  .col-tab { display:none; }
  .col-tab.active { display:flex; flex-direction:column; gap:10px; padding-bottom:80px; }
  #mob-bar { display:flex; position:fixed; bottom:0; width:100%; background:white; border-top:1px solid #ddd; padding:10px; justify-content:space-around; z-index:100; }
}
</style>
</head>
<body>

<div id="app">
    <header>
        <div class="brand">
            <span id="brandIcon" style="font-size:24px;">🌱</span>
            <div class="brand-name" id="brandNameDisplay">음악이 흐르는 농장</div>
        </div>
        <div class="stats-bar">
            <div class="stat">💰 <span id="moneyDisplay">0</span></div>
            <div class="stat">⭐ <span id="repDisplay">0</span></div>
            <div class="stat">📅 Day <span id="dayDisplay">1</span></div>
        </div>
        <div style="margin-left:auto;">
            <button class="btn btn-secondary btn-sm" onclick="audio.toggleMute()">🔊 <span id="muteLabel">소리 켬</span></button>
        </div>
    </header>

    <main id="game-main">
        <div id="col-farm" class="col-tab active">
            <div class="panel">
                <div class="panel-title" style="font-family:'Jua';">🌾 나의 농장</div>
                <div id="farm-grid"></div>
                <div id="inventoryInline" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
            </div>
            <div class="panel">
                <div class="panel-title" style="font-family:'Jua';">📜 활동 로그</div>
                <div id="logEntries" style="height:150px; overflow-y:auto; font-size:12px; line-height:1.6; color:#555;"></div>
            </div>
        </div>

        <div id="col-cafe" class="col-tab">
            <div id="cafe-locked" class="panel" style="text-align:center; padding:40px 10px;">
                <h3 style="margin-bottom:10px; font-family:'Jua';">🔐 카페 오픈 대기 중</h3>
                <p style="font-size:13px; color:#666; margin-bottom:20px;">재료 20개를 수확하면<br>카페 배경음악이 바뀝니다!</p>
                <button class="btn btn-primary" id="openCafeBtn" onclick="game.openCafe()" style="display:none; margin:0 auto;">☕ 카페 오픈하기</button>
            </div>
            <div id="cafe-open" class="panel" style="display:none;">
                <div class="panel-title" style="font-family:'Jua';">☕ <span id="cafeStageTitle">노점 카페</span></div>
                <div style="margin:10px 0;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px;">
                        <span>명성도 진행도</span>
                        <span id="progressText">0 / 200</span>
                    </div>
                    <div style="height:6px; background:#eee; border-radius:3px; overflow:hidden;">
                        <div id="progressFill" style="height:100%; width:0%; background:var(--sun); transition:0.5s;"></div>
                    </div>
                </div>
                <div id="customerList" style="margin-top:10px;"></div>
            </div>
        </div>

        <div id="col-manage" class="col-tab">
            <div class="panel">
                <div class="panel-title" style="font-family:'Jua';">⚙️ 설정 및 관리</div>
                <button class="btn" onclick="game.save(true)" style="background:#ddd; width:100%;">💾 수동 저장</button>
                <button class="btn" onclick="game.reset()" style="background:#ffcdd2; margin-top:5px; width:100%;">⚠️ 초기화</button>
            </div>
        </div>
    </main>

    <nav id="mob-bar">
        <button class="btn" onclick="ui.mobileSwitch('farm')">🌾 농장</button>
        <button class="btn" onclick="ui.mobileSwitch('cafe')">☕ 카페</button>
        <button class="btn" onclick="ui.mobileSwitch('manage')">⚙️ 관리</button>
    </nav>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div id="modalContent" class="modal"></div>
</div>

<script>
'use strict';

/**
 * [audio] 사운드 시스템: Web Audio API 합성 및 BGM 관리
 */
const audio = {
    ctx: null,
    isMuted: false,
    bgm: null,
    currentBgm: '',

    init() {
        // 브라우저 정책상 사용자 클릭 후 오디오 활성화 가능
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },

    toggleMute() {
        this.isMuted = !this.isMuted;
        document.getElementById('muteLabel').textContent = this.isMuted ? '소리 끔' : '소리 켬';
        if (this.isMuted) this.ctx.suspend(); else this.ctx.resume();
    },

    // 효과음 합성 (파일 없이 코드만으로 재생)
    playSfx(type) {
        if (!this.ctx || this.isMuted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;

        if (type === 'plant') { // 툭
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'harvest') { // 뽀드득 (높은 톤)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'serve') { // 띠링
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'click') { // 딸깍
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(); osc.stop(now + 0.05);
        } else if (type === 'lvlup') { // 빰빠밤
            [523.25, 659.25, 783.99].forEach((f, i) => {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.1, now + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.3);
            });
        }
    },

    // 탭 전환 시 배경음악 변경 (무료 오디오 라이브러리 예시 링크)
    updateBgm(mode) {
        if (this.currentBgm === mode) return;
        this.currentBgm = mode;

        if (this.bgm) { this.bgm.pause(); this.bgm = null; }

        // 실제 음원을 넣고 싶다면 아래 URL을 변경하세요.
        // 농장: 새소리 / 카페: 재즈 등
        const urls = {
            'farm': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3', // 예시 배경음
            'cafe': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'   // 예시 배경음
        };

        this.bgm = new Audio(urls[mode] || urls.farm);
        this.bgm.loop = true;
        this.bgm.volume = 0.2;
        if (!this.isMuted) this.bgm.play().catch(e => console.log("자동재생 방지됨"));
    }
};

/**
 * [game] 핵심 로직
 */
const game = {
    state: {
        money: 5000, reputation: 0, day: 1, stage: 0,
        cafeOpen: false, 
        plots: Array(8).fill(null).map(() => ({ crop: null, plantedAt: null, stage: 'empty' })),
        inventory: {},
        learnedRecipes: ['egg_toast'],
        secondsPlayed: 0, dayTimer: 0
    },

    CROPS: {
        wheat: { emoji: '🌾', name: '밀', growTime: 10, cost: 500, yield: 5, gives: 'wheat' },
        egg: { emoji: '🥚', name: '달걀', growTime: 8, cost: 300, yield: 3, gives: 'egg' },
        bean: { emoji: '🫘', name: '커피콩', growTime: 20, cost: 1000, yield: 6, gives: 'bean' }
    },

    RECIPES: {
        egg_toast: { name: '계란 토스트', price: 2500, ingredients: { wheat: 1, egg: 1 }, stageReq: 1 },
        americano: { name: '아메리카노', price: 3500, ingredients: { bean: 2 }, stageReq: 2 }
    },

    STAGES: [
        { name: '🌱 시작의 농장', repReq: 0 },
        { name: '🛖 길거리 노점', repReq: 200 },
        { name: '🥪 토스트 가게', repReq: 600 }
    ],

    init() {
        this.load();
        setInterval(() => this.tick(), 1000);
        window.addEventListener('beforeunload', () => this.save());
        ui.renderAll();
        audio.updateBgm('farm'); // 첫 시작은 농장 음악
    },

    tick() {
        if (this.state.paused) return;
        this.state.secondsPlayed++;
        this.state.dayTimer++;

        // 성장 로직
        this.state.plots.forEach(p => {
            if (p.stage === 'growing') {
                const elapsed = (Date.now() - p.plantedAt) / 1000;
                if (elapsed >= this.CROPS[p.crop].growTime) p.stage = 'ready';
            }
        });

        if (this.state.dayTimer >= 90) { this.state.dayTimer = 0; this.state.day++; this.save(true); }
        if (this.state.secondsPlayed % 30 === 0) this.save(true);
        if (this.state.cafeOpen && Math.random() < 0.05) this.spawnCustomer();

        ui.renderAll();
    },

    openCafe() {
        const total = Object.values(this.state.inventory).reduce((a, b) => a + b, 0);
        if (total >= 20) {
            audio.playSfx('lvlup');
            this.state.cafeOpen = true;
            this.state.stage = 1;
            ui.addLog("☕ 카페가 오픈되었습니다! 음악이 바뀝니다.");
            audio.updateBgm('cafe'); // 카페 오픈 시 음악 전환
            ui.renderAll();
        }
    },

    spawnCustomer() {
        const pool = Object.keys(this.RECIPES).filter(k => this.state.learnedRecipes.includes(k));
        const order = pool[Math.floor(Math.random() * pool.length)];
        ui.addCustomer(order);
    },

    save(silent = false) {
        localStorage.setItem('boss_save_audio_pro', JSON.stringify(this.state));
        if (silent && this.state.secondsPlayed % 60 === 0) ui.addLog("💾 데이터 자동 저장됨.");
    },

    load() {
        const saved = localStorage.getItem('boss_save_audio_pro');
        if (saved) this.state = { ...this.state, ...JSON.parse(saved) };
    },

    reset() { if (confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }
};

/**
 * [ui] 화면 렌더링 및 이펙트
 */
const ui = {
    renderAll() {
        document.getElementById('moneyDisplay').textContent = game.state.money.toLocaleString();
        document.getElementById('repDisplay').textContent = game.state.reputation;
        document.getElementById('dayDisplay').textContent = game.state.day;
        this.renderFarm();
        this.renderInventory();
        this.renderCafe();
    },

    // 플로팅 텍스트 애니메이션 (돈/아이템 획득 시)
    showFloatingText(x, y, text, color = 'var(--espresso)') {
        const el = document.createElement('div');
        el.className = 'floating-num';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    },

    renderFarm() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = game.state.plots.map((p, i) => {
            let content = '+'; let cls = '';
            if (p.stage !== 'empty') content = game.CROPS[p.crop].emoji;
            if (p.stage === 'ready') cls = 'ready';
            return `<div class="plot ${cls}" onclick="ui.plotClick(event, ${i})">${content}</div>`;
        }).join('');
    },

    plotClick(e, i) {
        if (!audio.ctx) audio.init(); // 첫 클릭 시 오디오 엔진 활성화
        const p = game.state.plots[i];
        if (p.stage === 'empty') {
            audio.playSfx('click');
            this.openSeedPicker(i);
        } else if (p.stage === 'ready') {
            audio.playSfx('harvest');
            const crop = game.CROPS[p.crop];
            game.state.inventory[crop.gives] = (game.state.inventory[crop.gives] || 0) + crop.yield;
            this.showFloatingText(e.pageX, e.pageY, `+${crop.yield}`, 'var(--grass)');
            game.state.plots[i] = { crop: null, plantedAt: null, stage: 'empty' };
            this.addLog(`🎉 ${crop.name} ${crop.yield}개 수확!`);
        }
    },

    openSeedPicker(idx) {
        const modal = document.getElementById('modalContent');
        modal.innerHTML = `<h3 style="font-family:'Jua';">🌱 씨앗 선택</h3><div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">` +
            Object.entries(game.CROPS).map(([k, c]) => 
                `<button class="btn" onclick="ui.plant(event, ${idx}, '${k}')" style="text-align:left; background:#f5f5f5;">
                    ${c.emoji} ${c.name} (💰${c.cost})
                </button>`
            ).join('') + `</div><button class="btn" onclick="ui.closeModal()" style="margin-top:15px; width:100%;">취소</button>`;
        document.getElementById('modalOverlay').classList.add('show');
    },

    plant(e, idx, k) {
        const crop = game.CROPS[k];
        if (game.state.money >= crop.cost) {
            audio.playSfx('plant');
            game.state.money -= crop.cost;
            game.state.plots[idx] = { crop: k, plantedAt: Date.now(), stage: 'growing' };
            this.showFloatingText(e.pageX, e.pageY, `-💰${crop.cost}`, '#e74c3c');
            this.closeModal();
            this.addLog(`🌱 ${crop.name}을(를) 심었습니다.`);
        } else {
            alert("자금이 부족합니다!");
        }
    },

    renderInventory() {
        const inv = document.getElementById('inventoryInline');
        inv.innerHTML = Object.entries(game.state.inventory).map(([k, v]) => 
            v > 0 ? `<div class="inv-chip">📦 ${v}</div>` : ''
        ).join('');
    },

    renderCafe() {
        const locked = document.getElementById('cafe-locked');
        const open = document.getElementById('cafe-open');
        const btn = document.getElementById('openCafeBtn');
        if (game.state.cafeOpen) {
            locked.style.display = 'none'; open.style.display = 'block';
            this.updateProgress();
        } else {
            const total = Object.values(game.state.inventory).reduce((a, b) => a + b, 0);
            if (total >= 20) btn.style.display = 'block';
        }
    },

    updateProgress() {
        const stage = game.STAGES[game.state.stage];
        const next = game.STAGES[game.state.stage + 1];
        if (next) {
            const pct = Math.min(100, (game.state.reputation / next.repReq) * 100);
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('progressText').textContent = `${game.state.reputation} / ${next.repReq}`;
            if (game.state.reputation >= next.repReq) {
                audio.playSfx('lvlup');
                game.state.stage++;
                this.addLog(`🎊 카페 레벨업: ${game.STAGES[game.state.stage].name}`);
            }
        }
        document.getElementById('cafeStageTitle').textContent = stage.name;
    },

    addCustomer(order) {
        const list = document.getElementById('customerList');
        const id = Date.now();
        const recipe = game.RECIPES[order];
        const div = document.createElement('div');
        div.style = "background:white; padding:10px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;";
        div.innerHTML = `<div><b>손님</b><br><small>${recipe.name}</small></div>
            <button class="btn btn-primary" style="padding:4px 8px; font-size:11px;" onclick="ui.serveCustomer(event, ${id}, '${order}', this)">서빙</button>`;
        list.appendChild(div);
    },

    serveCustomer(e, id, order, btn) {
        const recipe = game.RECIPES[order];
        let canServe = true;
        for (const [ing, qty] of Object.entries(recipe.ingredients)) {
            if ((game.state.inventory[ing] || 0) < qty) canServe = false;
        }

        if (canServe) {
            audio.playSfx('serve');
            for (const [ing, qty] of Object.entries(recipe.ingredients)) game.state.inventory[ing] -= qty;
            game.state.money += recipe.price;
            game.state.reputation += 20;
            this.showFloatingText(e.pageX, e.pageY, `+💰${recipe.price}`, 'var(--gold)');
            btn.parentElement.remove();
            this.addLog(`✅ 서빙 성공! (+💰${recipe.price})`);
            this.renderAll();
        } else {
            alert("재료가 부족합니다!");
        }
    },

    addLog(msg) {
        const log = document.getElementById('logEntries');
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        log.prepend(div);
        if (log.children.length > 30) log.lastChild.remove();
    },

    mobileSwitch(id) {
        audio.playSfx('click');
        document.querySelectorAll('.col-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('col-' + id).classList.add('active');
        // 탭에 따라 배경음악 즉시 변경 시도
        audio.updateBgm(id === 'manage' ? 'farm' : id);
    },

    closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
};

// 시작 시 오디오 시스템은 사용자 인터랙션 후 활성화됨
game.init();
</script>
</body>
</html>
