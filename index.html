<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나도 사장 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
:root {
  --soil:#6B4226; --grass:#5A8A3C; --sun:#F4C430;
  --cream:#FFF8F0; --latte:#C8956C; --espresso:#3B1F0F;
  --gold:#D4A017; --text:#2C1A0E;
  --panel:rgba(255,248,240,0.96);
  --shadow:0 4px 20px rgba(59,31,15,0.12);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Gowun Dodum',sans-serif; color:var(--text); min-height:100vh; background:var(--cream); overflow-x:hidden; }
#app { display:grid; grid-template-rows:auto 1fr; min-height:100vh; max-width:1400px; margin:0 auto; padding:10px; gap:8px; }

/* HEADER */
header { background:var(--panel); border-radius:16px; padding:10px 18px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); border:2px solid rgba(212,160,23,0.25); flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:8px; flex:1; }
.brand-name { font-family:'Nanum Myeongjo',serif; font-size:20px; font-weight:800; color:var(--espresso); }
.stats-bar { display:flex; gap:12px; align-items:center; }
.stat { font-size:13px; font-weight:600; display:flex; align-items:center; gap:4px; }

/* MAIN CONTENT */
#game-main { display:grid; grid-template-columns:300px 1fr 300px; gap:10px; }
.panel { background:var(--panel); border-radius:14px; padding:15px; border:1.5px solid rgba(200,149,108,0.18); display:flex; flex-direction:column; gap:10px; box-shadow:var(--shadow); }
.panel-title { font-family:'Nanum Myeongjo',serif; font-size:15px; font-weight:700; color:var(--espresso); border-bottom:2px dashed rgba(200,149,108,0.28); padding-bottom:8px; }

/* FARM & PLOTS */
#farm-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.plot { aspect-ratio:1; border-radius:10px; border:2px solid rgba(107,66,38,0.3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:24px; position:relative; background:#eee; transition:0.2s; }
.plot.ready { animation:pulse 1.5s infinite; background:#fff; border-color:var(--sun); }
@keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(244,196,48,0.4); } 70% { box-shadow:0 0 0 10px rgba(244,196,48,0); } 100% { box-shadow:0 0 0 0 rgba(244,196,48,0); } }

/* INVENTORY */
.inv-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(107,66,38,0.08); padding:4px 10px; border-radius:20px; font-size:12px; border:1px solid transparent; }

/* BTN */
.btn { cursor:pointer; border:none; border-radius:8px; padding:8px 12px; font-family:inherit; font-weight:600; transition:0.2s; }
.btn-primary { background:var(--espresso); color:white; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.show { display:flex; }
.modal { background:var(--cream); padding:25px; border-radius:20px; width:90%; max-width:400px; }

/* MOBILE */
#mob-bar { display:none; }
@media (max-width: 768px) {
  #game-main { display:block; }
  .col-tab { display:none; }
  .col-tab.active { display:flex; flex-direction:column; gap:10px; padding-bottom:80px; }
  #mob-bar { display:flex; position:fixed; bottom:0; width:100%; background:white; border-top:1px solid #ddd; padding:10px; justify-content:space-around; z-index:100; }
}
</style>
</head>
<body>

<div id="app">
    <header>
        <div class="brand">
            <span id="brandIcon" style="font-size:24px;">🌱</span>
            <div class="brand-name" id="brandNameDisplay">행복 농장</div>
        </div>
        <div class="stats-bar">
            <div class="stat">💰 <span id="moneyDisplay">0</span></div>
            <div class="stat">⭐ <span id="repDisplay">0</span></div>
            <div class="stat">📅 Day <span id="dayDisplay">1</span></div>
        </div>
    </header>

    <main id="game-main">
        <div id="col-farm" class="col-tab active">
            <div class="panel">
                <div class="panel-title">🌾 나의 농장</div>
                <div id="farm-grid"></div>
                <div id="inventoryInline" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
            </div>
            <div class="panel">
                <div class="panel-title">📜 활동 로그</div>
                <div id="logEntries" style="height:150px; overflow-y:auto; font-size:12px; line-height:1.6;"></div>
            </div>
        </div>

        <div id="col-cafe" class="col-tab">
            <div id="cafe-locked" class="panel" style="text-align:center; padding:40px 10px;">
                <h3 style="margin-bottom:10px;">🔐 카페가 잠겨있습니다</h3>
                <p style="font-size:13px; color:#666; margin-bottom:20px;">농장 재료 20개를 수확하여<br>첫 노점을 오픈하세요!</p>
                <button class="btn btn-primary" id="openCafeBtn" onclick="game.openCafe()" style="display:none; margin:0 auto;">☕ 카페 오픈하기</button>
            </div>
            <div id="cafe-open" class="panel" style="display:none;">
                <div class="panel-title">☕ <span id="cafeStageTitle">노점 카페</span></div>
                <div style="margin:10px 0;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px;">
                        <span>명성도 진행도</span>
                        <span id="progressText">0 / 200</span>
                    </div>
                    <div style="height:6px; background:#eee; border-radius:3px; overflow:hidden;">
                        <div id="progressFill" style="height:100%; width:0%; background:var(--sun); transition:0.5s;"></div>
                    </div>
                </div>
                <div id="customerList" style="margin-top:10px;"></div>
            </div>
        </div>

        <div id="col-manage" class="col-tab">
            <div class="panel">
                <div class="panel-title">⚙️ 설정 및 관리</div>
                <button class="btn" onclick="game.save(true)" style="background:#ddd;">💾 수동 저장</button>
                <button class="btn" onclick="game.reset()" style="background:#ffcdd2; margin-top:5px;">⚠️ 초기화</button>
            </div>
        </div>
    </main>

    <nav id="mob-bar">
        <button class="btn" onclick="ui.switchTab('farm')">🌾 농장</button>
        <button class="btn" onclick="ui.switchTab('cafe')">☕ 카페</button>
        <button class="btn" onclick="ui.switchTab('manage')">⚙️ 관리</button>
    </nav>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div id="modalContent" class="modal"></div>
</div>

<script>
/**
 * [game.js] 핵심 로직 및 자동 저장
 */
const game = {
    state: {
        money: 5000,
        reputation: 0,
        day: 1,
        stage: 0,
        cafeOpen: false,
        plots: Array(4).fill(null).map(() => ({ crop: null, plantedAt: null, stage: 'empty' })),
        inventory: {},
        learnedRecipes: ['egg_toast'],
        secondsPlayed: 0
    },

    CROPS: {
        wheat: { emoji: '🌾', name: '밀', growTime: 10, cost: 500, yield: 5 },
        egg: { emoji: '🥚', name: '달걀', growTime: 8, cost: 300, yield: 3 },
        bean: { emoji: '🫘', name: '커피콩', growTime: 20, cost: 1000, yield: 6 }
    },

    RECIPES: {
        egg_toast: { name: '계란 토스트', price: 2500, ingredients: { wheat: 1, egg: 1 }, stageReq: 1 },
        americano: { name: '아메리카노', price: 3500, ingredients: { bean: 2 }, stageReq: 2 }
    },

    STAGES: [
        { name: '🌱 시작의 농장', repReq: 0 },
        { name: '🛖 길거리 노점', repReq: 200 },
        { name: '🥪 토스트 가게', repReq: 600 }
    ],

    init() {
        this.load();
        setInterval(() => this.tick(), 1000);
        window.addEventListener('beforeunload', () => this.save()); // 종료 시 자동 저장
        ui.renderAll();
    },

    tick() {
        this.state.secondsPlayed++;
        
        // 농장 성장 체크
        this.state.plots.forEach(p => {
            if (p.stage === 'growing') {
                const elapsed = (Date.now() - p.plantedAt) / 1000;
                if (elapsed >= this.CROPS[p.crop].growTime) p.stage = 'ready';
            }
        });

        // 자동 저장 (30초 주기)
        if (this.state.secondsPlayed % 30 === 0) this.save(true);

        // 카페 손님 생성 (랜덤)
        if (this.state.cafeOpen && Math.random() < 0.05) this.spawnCustomer();

        ui.renderAll();
    },

    spawnCustomer() {
        const recipes = Object.keys(this.RECIPES).filter(k => this.state.learnedRecipes.includes(k));
        const order = recipes[Math.floor(Math.random() * recipes.length)];
        ui.addCustomer(order);
    },

    openCafe() {
        const total = Object.values(this.state.inventory).reduce((a, b) => a + b, 0);
        if (total >= 20) {
            this.state.cafeOpen = true;
            this.state.stage = 1;
            ui.addLog("☕ 카페가 오픈되었습니다!");
            ui.renderAll();
        }
    },

    save(showLog = false) {
        localStorage.setItem('boss_save_v2', JSON.stringify(this.state));
        if (showLog) ui.addLog("💾 데이터가 안전하게 저장되었습니다.");
    },

    load() {
        const saved = localStorage.getItem('boss_save_v2');
        if (saved) {
            const data = JSON.parse(saved);
            this.state = { ...this.state, ...data }; // 데이터 안전 병합
        }
    },

    reset() {
        if (confirm("모든 데이터를 초기화할까요?")) {
            localStorage.removeItem('boss_save_v2');
            location.reload();
        }
    }
};

/**
 * [ui.js] 화면 렌더링 및 인터랙션
 */
const ui = {
    renderAll() {
        document.getElementById('moneyDisplay').textContent = game.state.money.toLocaleString();
        document.getElementById('repDisplay').textContent = game.state.reputation;
        document.getElementById('dayDisplay').textContent = game.state.day;
        this.renderFarm();
        this.renderInventory();
        this.renderCafe();
    },

    renderFarm() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = game.state.plots.map((p, i) => {
            let content = '+';
            let cls = '';
            if (p.stage === 'growing') content = game.CROPS[p.crop].emoji;
            if (p.stage === 'ready') { content = game.CROPS[p.crop].emoji; cls = 'ready'; }
            return `<div class="plot ${cls}" onclick="ui.plotClick(${i})">${content}</div>`;
        }).join('');
    },

    plotClick(i) {
        const p = game.state.plots[i];
        if (p.stage === 'empty') this.openSeedPicker(i);
        else if (p.stage === 'ready') {
            const yieldAmt = game.CROPS[p.crop].yield;
            game.state.inventory[p.crop] = (game.state.inventory[p.crop] || 0) + yieldAmt;
            game.state.plots[i] = { crop: null, plantedAt: null, stage: 'empty' };
            this.addLog(`🎉 ${game.CROPS[p.crop].name} 수확 완료! (+${yieldAmt})`);
        }
    },

    openSeedPicker(idx) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        content.innerHTML = `<h3>🌱 씨앗 선택</h3><div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">` +
            Object.entries(game.CROPS).map(([k, c]) => 
                `<button class="btn" onclick="ui.plant(${idx}, '${k}')" style="text-align:left; background:#f5f5f5;">
                    ${c.emoji} ${c.name} (💰${c.cost})
                </button>`
            ).join('') + `</div><button class="btn" onclick="ui.closeModal()" style="margin-top:15px; width:100%;">취소</button>`;
        overlay.classList.add('show');
    },

    plant(idx, k) {
        const crop = game.CROPS[k];
        if (game.state.money >= crop.cost) {
            game.state.money -= crop.cost;
            game.state.plots[idx] = { crop: k, plantedAt: Date.now(), stage: 'growing' };
            this.closeModal();
            this.addLog(`🌱 ${crop.name}을(를) 심었습니다.`);
        } else {
            alert("자금이 부족합니다!");
        }
    },

    renderInventory() {
        const inv = document.getElementById('inventoryInline');
        inv.innerHTML = Object.entries(game.state.inventory).map(([k, v]) => 
            v > 0 ? `<div class="inv-chip">${game.CROPS[k].emoji} ${v}</div>` : ''
        ).join('');
    },

    renderCafe() {
        const locked = document.getElementById('cafe-locked');
        const open = document.getElementById('cafe-open');
        const btn = document.getElementById('openCafeBtn');
        
        if (game.state.cafeOpen) {
            locked.style.display = 'none';
            open.style.display = 'block';
            this.updateProgress();
        } else {
            const total = Object.values(game.state.inventory).reduce((a, b) => a + b, 0);
            if (total >= 20) btn.style.display = 'block';
        }
    },

    updateProgress() {
        const stage = game.STAGES[game.state.stage];
        const next = game.STAGES[game.state.stage + 1];
        if (next) {
            const pct = Math.min(100, (game.state.reputation / next.repReq) * 100);
            document.getElementById('progressFill').style.width = pct + "%";
            document.getElementById('progressText').textContent = `${game.state.reputation} / ${next.repReq}`;
            if (game.state.reputation >= next.repReq) {
                game.state.stage++;
                this.addLog(`🎊 카페 레벨업: ${game.STAGES[game.state.stage].name}`);
            }
        }
        document.getElementById('cafeStageTitle').textContent = stage.name;
    },

    addCustomer(order) {
        const list = document.getElementById('customerList');
        const id = Date.now();
        const recipe = game.RECIPES[order];
        const div = document.createElement('div');
        div.style = "background:white; padding:10px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;";
        div.innerHTML = `<div><b>손님</b><br><small>${recipe.name}</small></div>
            <button class="btn btn-primary" style="padding:4px 8px; font-size:11px;" onclick="ui.serveCustomer(${id}, '${order}', this)">서빙</button>`;
        list.appendChild(div);
    },

    serveCustomer(id, order, btn) {
        const recipe = game.RECIPES[order];
        let canServe = true;
        for (const [ing, qty] of Object.entries(recipe.ingredients)) {
            if ((game.state.inventory[ing] || 0) < qty) canServe = false;
        }

        if (canServe) {
            for (const [ing, qty] of Object.entries(recipe.ingredients)) game.state.inventory[ing] -= qty;
            game.state.money += recipe.price;
            game.state.reputation += 20;
            btn.parentElement.remove();
            this.addLog(`✅ 서빙 성공! (+💰${recipe.price})`);
            this.renderAll();
        } else {
            alert("재료가 부족합니다!");
        }
    },

    addLog(msg) {
        const log = document.getElementById('logEntries');
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        log.prepend(div);
    },

    switchTab(id) {
        document.querySelectorAll('.col-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('col-' + id).classList.add('active');
    },

    closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
};

game.init();
</script>
</body>
</html>
